<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Last Signal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <style>
    /* ─── RESET & BASE ─────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      font-family: 'Orbitron', monospace;
    }

    /* ─── CANVAS ────────────────────────────────────────────────────────── */
    #gameCanvas {
      display: block;
      /* Soft outer glow — makes it feel submerged */
      box-shadow:
        0 0 60px rgba(0, 180, 200, 0.12),
        0 0 120px rgba(0, 80, 120, 0.18),
        inset 0 0 40px rgba(0,0,0,0.8);
    }

    /* ─── HUD OVERLAY (sits on top of canvas via absolute positioning) ─── */
    #hud {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;       /* clicks pass through to canvas */
      display: flex;
      flex-direction: column;
      padding: 18px 24px;
      gap: 10px;
    }

    /* Top row: oxygen bar + depth meter */
    #hud-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      width: 100%;
    }

    /* ── Oxygen bar ── */
    #oxy-wrap {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    #oxy-label {
      font-size: 9px;
      letter-spacing: 3px;
      color: rgba(0, 230, 200, 0.6);
      text-transform: uppercase;
    }
    #oxy-bar-bg {
      width: 220px;
      height: 10px;
      background: rgba(0, 40, 60, 0.8);
      border: 1px solid rgba(0, 200, 180, 0.25);
      border-radius: 2px;
      overflow: hidden;
      position: relative;
    }
    #oxy-bar-fill {
      height: 100%;
      width: 100%;           /* JS will update this */
      background: linear-gradient(90deg, #00c8a0, #00ecd4);
      border-radius: 2px;
      transition: background 0.5s;
      box-shadow: 0 0 8px rgba(0, 230, 200, 0.6);
    }

    /* ── Depth meter ── */
    #depth-wrap {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 5px;
    }
    #depth-label {
      font-size: 9px;
      letter-spacing: 3px;
      color: rgba(0, 180, 230, 0.6);
      text-transform: uppercase;
    }
    #depth-value {
      font-family: 'Share Tech Mono', monospace;
      font-size: 22px;
      color: rgba(0, 210, 255, 0.85);
      text-shadow: 0 0 12px rgba(0, 200, 255, 0.5);
      letter-spacing: 2px;
    }

    /* ── Sonar cooldown (bottom-left) ── */
    #sonar-wrap {
      position: absolute;
      bottom: 22px;
      left: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    #sonar-ring {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 2px solid rgba(0, 230, 150, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    #sonar-ring::after {
      content: '';
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 1px solid rgba(0, 230, 150, 0.15);
    }
    #sonar-key {
      font-size: 8px;
      letter-spacing: 2px;
      color: rgba(0, 200, 130, 0.5);
      text-transform: uppercase;
    }

    /* ── Small status line ── */
    #status-line {
      position: absolute;
      bottom: 22px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      letter-spacing: 2px;
      color: rgba(0, 180, 200, 0.4);
      text-transform: uppercase;
    }
  </style>
</head>
<body>

<!-- ─── CANVAS ─────────────────────────────────────────────────────────────── -->
<canvas id="gameCanvas"></canvas>

<!-- ─── HUD (HTML overlay, not drawn on canvas) ──────────────────────────── -->
<div id="hud">
  <div id="hud-top">
    <div id="oxy-wrap">
      <div id="oxy-label">O₂ Supply</div>
      <div id="oxy-bar-bg">
        <div id="oxy-bar-fill"></div>
      </div>
    </div>
    <div id="depth-wrap">
      <div id="depth-label">Depth</div>
      <div id="depth-value">0m</div>
    </div>
  </div>
  <div id="sonar-wrap">
    <div id="sonar-ring"></div>
    <div id="sonar-key">SPACE · SONAR</div>
  </div>
  <div id="status-line" id="status-line">Navigating · Signal Detected</div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════════════
//  THE LAST SIGNAL — Step 3: Fixed Rocks + Creatures
//  Sections:
//    1. Canvas Setup
//    2. Constants & Config
//    3. Game State
//    4. Particle System (background atmosphere)
//    5. Player (submarine)
//    6. Input Handling
//    7. Draw Helpers
//    8. Obstacle System (rocks fixed, debris, coral)
//    9. Creature System          ← NEW
//   10. Update Logic
//   11. Render Logic
//   12. Game Loop
// ═══════════════════════════════════════════════════════════════════════════


// ─── 1. CANVAS SETUP ────────────────────────────────────────────────────────
const canvas  = document.getElementById('gameCanvas');
const ctx     = canvas.getContext('2d');

// We use a fixed logical resolution and CSS-scale it.
// This keeps all coordinate math predictable regardless of screen size.
const LOGICAL_W = 960;
const LOGICAL_H = 540;

canvas.width  = LOGICAL_W;
canvas.height = LOGICAL_H;

// Scale to fit the viewport while preserving aspect ratio
function resizeCanvas() {
  const scaleX = window.innerWidth  / LOGICAL_W;
  const scaleY = window.innerHeight / LOGICAL_H;
  const scale  = Math.min(scaleX, scaleY);
  canvas.style.width  = (LOGICAL_W * scale) + 'px';
  canvas.style.height = (LOGICAL_H * scale) + 'px';
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);


// ─── 2. CONSTANTS & CONFIG ──────────────────────────────────────────────────
const CFG = {
  // Player physics
  PLAYER_ACCEL:    0.45,   // thrust per frame
  PLAYER_DRAG:     0.88,   // velocity multiplier each frame (< 1 = drag)
  PLAYER_MAX_SPD:  5.5,

  // World
  SCROLL_SPEED:    1.8,    // how fast the world scrolls left (world units/frame)
  WORLD_LENGTH:    12000,  // total world width in px before win condition

  // Oxygen (placeholder values — will be wired up in Step 4)
  OXY_MAX:         100,
  OXY_DRAIN_RATE:  0,      // set to 0 for now so it doesn't affect testing

  // Parallax layer speeds (fraction of scroll speed)
  PARALLAX: [0.15, 0.30, 0.55, 0.80],

  // Visual
  BOB_AMPLITUDE:   2.5,    // px of idle bobbing
  BOB_SPEED:       0.04,   // radians per frame

  // Obstacles
  ROCK_SPACING:    340,    // world-units between rock gate pairs
  ROCK_GAP_MIN:    160,    // minimum vertical gap the player can pass through
  ROCK_GAP_MAX:    220,    // maximum gap — decreases challenge if too large
  DEBRIS_SPACING:  420,    // world-units between mid-water debris chunks
  CORAL_SPACING:   480,    // world-units between coral clusters

  // Creatures
  CREATURE_SPACING: 900,   // world-units between creature spawn attempts

  // Debug — set true to see collision boxes
  DEBUG:           false,
};


// ─── 3. GAME STATE ──────────────────────────────────────────────────────────
// Central truth for every mutable piece of game data.
// Keeping it in one object makes save/reset trivial later.
const state = {
  tick:        0,          // incremented every frame — drives animations
  worldX:      0,          // how far the world has scrolled (px)
  oxygen:      CFG.OXY_MAX,
  running:     true,
  colliding:   false,      // true when sub overlaps an obstacle this frame
  player: {
    x:   140,              // logical screen position (stays roughly centred-left)
    y:   LOGICAL_H / 2,
    vx:  0,
    vy:  0,
    bobOffset: 0,          // current sine value for idle bob
  },
};


// ─── 4. PARTICLE SYSTEM ─────────────────────────────────────────────────────
// Three layers of drifting particles create the illusion of depth.
// Each layer scrolls at a different speed (parallax).
// Particles represent: micro-sediment, drifting plankton, distant debris.

const PARTICLE_LAYERS = [
  // Layer 0 — farthest back: tiny dim specs, very slow
  { count: 60,  minR: 0.5, maxR: 1.2, color: 'rgba(0,160,180,0.18)', speed: CFG.PARALLAX[0] },
  // Layer 1 — mid-back: small glowing motes
  { count: 40,  minR: 0.8, maxR: 1.8, color: 'rgba(0,200,160,0.22)', speed: CFG.PARALLAX[1] },
  // Layer 2 — mid: slightly larger, greener (bioluminescent feel)
  { count: 25,  minR: 1.0, maxR: 2.5, color: 'rgba(20,220,160,0.28)', speed: CFG.PARALLAX[2] },
  // Layer 3 — near: largest, brightest — pass by quickly
  { count: 15,  minR: 1.5, maxR: 3.5, color: 'rgba(60,230,180,0.35)', speed: CFG.PARALLAX[3] },
];

// Initialise particles; each has its own random position, drift velocity,
// and a layer index so we know which parallax speed to apply.
const particles = [];

PARTICLE_LAYERS.forEach((layer, li) => {
  for (let i = 0; i < layer.count; i++) {
    particles.push(spawnParticle(layer, li, true));
  }
});

function spawnParticle(layer, layerIndex, randomX = false) {
  return {
    x:     randomX ? Math.random() * LOGICAL_W : LOGICAL_W + Math.random() * 60,
    y:     Math.random() * LOGICAL_H,
    r:     layer.minR + Math.random() * (layer.maxR - layer.minR),
    vy:    (Math.random() - 0.5) * 0.18,   // gentle vertical drift
    alpha: 0.4 + Math.random() * 0.6,       // twinkle base
    twinkleSpeed: 0.01 + Math.random() * 0.03,
    twinklePhase: Math.random() * Math.PI * 2,
    layer: layerIndex,
    layerRef: layer,
  };
}

function updateParticles() {
  particles.forEach(p => {
    const layer = p.layerRef;
    // Scroll left at the layer's parallax speed
    p.x -= CFG.SCROLL_SPEED * layer.speed;
    p.y += p.vy;
    // Twinkle
    p.twinklePhase += p.twinkleSpeed;

    // Wrap around when they exit left edge
    if (p.x < -10) {
      Object.assign(p, spawnParticle(layer, p.layer, false));
    }
    // Wrap vertical
    if (p.y < -10)  p.y = LOGICAL_H + 5;
    if (p.y > LOGICAL_H + 10) p.y = -5;
  });
}

function drawParticles() {
  particles.forEach(p => {
    const twinkle = 0.5 + 0.5 * Math.sin(p.twinklePhase);
    const a = p.alpha * (0.6 + 0.4 * twinkle);
    ctx.save();
    ctx.globalAlpha = a;
    ctx.fillStyle   = p.layerRef.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  });
}


// ─── 5. PLAYER (SUBMARINE) ──────────────────────────────────────────────────
// The sub is drawn entirely with canvas 2D shapes — no images needed.
// It has three parts: hull, conning tower, propeller.
// The whole thing is translated by the bob offset each frame.

function updatePlayer() {
  const p = state.player;

  // Apply thrust from held keys
  if (keys.up   || keys.w) p.vy -= CFG.PLAYER_ACCEL;
  if (keys.down || keys.s) p.vy += CFG.PLAYER_ACCEL;
  if (keys.left || keys.a) p.vx -= CFG.PLAYER_ACCEL;
  if (keys.right|| keys.d) p.vx += CFG.PLAYER_ACCEL;

  // Clamp speed
  const spd = Math.hypot(p.vx, p.vy);
  if (spd > CFG.PLAYER_MAX_SPD) {
    p.vx = (p.vx / spd) * CFG.PLAYER_MAX_SPD;
    p.vy = (p.vy / spd) * CFG.PLAYER_MAX_SPD;
  }

  // Drag — gradually kills velocity when no key held
  p.vx *= CFG.PLAYER_DRAG;
  p.vy *= CFG.PLAYER_DRAG;

  // Integrate
  p.x += p.vx;
  p.y += p.vy;

  // Idle bobbing (always active, independent of input)
  p.bobOffset = Math.sin(state.tick * CFG.BOB_SPEED) * CFG.BOB_AMPLITUDE;

  // Clamp to canvas bounds — leave a margin so the sub never clips
  p.x = Math.max(40,  Math.min(LOGICAL_W - 80, p.x));
  p.y = Math.max(30,  Math.min(LOGICAL_H - 30, p.y));
}

function drawSubmarine(x, y) {
  // y already includes bob offset when called
  ctx.save();
  ctx.translate(x, y);

  // ── Propeller (drawn first / behind hull) ──
  const propTime = state.tick * 0.25;
  ctx.save();
  ctx.translate(-46, 0);
  for (let b = 0; b < 3; b++) {
    const angle = propTime + (b * Math.PI * 2 / 3);
    ctx.save();
    ctx.rotate(angle);
    ctx.fillStyle = 'rgba(80, 160, 180, 0.85)';
    ctx.beginPath();
    ctx.ellipse(0, -7, 3, 7, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
  // Prop hub
  ctx.fillStyle = '#1a8fa0';
  ctx.beginPath();
  ctx.arc(0, 0, 3.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // ── Hull shadow (gives depth) ──
  ctx.save();
  ctx.shadowColor = 'rgba(0, 200, 220, 0.15)';
  ctx.shadowBlur  = 18;

  // Main hull — elongated ellipse
  const hullGrad = ctx.createLinearGradient(-40, -14, -40, 14);
  hullGrad.addColorStop(0,   '#1e6a7a');
  hullGrad.addColorStop(0.4, '#0e4a5a');
  hullGrad.addColorStop(1,   '#081e28');
  ctx.fillStyle = hullGrad;
  ctx.beginPath();
  ctx.ellipse(0, 0, 44, 13, 0, 0, Math.PI * 2);
  ctx.fill();

  // Hull rim / highlight
  ctx.strokeStyle = 'rgba(0, 200, 220, 0.45)';
  ctx.lineWidth   = 1.2;
  ctx.stroke();
  ctx.restore();

  // ── Conning tower ──
  const towerGrad = ctx.createLinearGradient(8, -24, 22, -12);
  towerGrad.addColorStop(0, '#1a7a8a');
  towerGrad.addColorStop(1, '#0a3a48');
  ctx.fillStyle = towerGrad;
  ctx.beginPath();
  ctx.roundRect(8, -24, 16, 14, [3, 3, 0, 0]);
  ctx.fill();
  ctx.strokeStyle = 'rgba(0, 200, 220, 0.3)';
  ctx.lineWidth = 1;
  ctx.stroke();

  // Tower porthole
  ctx.fillStyle = 'rgba(0, 230, 255, 0.25)';
  ctx.beginPath();
  ctx.arc(16, -18, 3.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = 'rgba(0, 220, 255, 0.6)';
  ctx.lineWidth = 0.8;
  ctx.stroke();

  // ── Nose light ──
  const noseGlow = ctx.createRadialGradient(44, 0, 0, 44, 0, 16);
  noseGlow.addColorStop(0,   'rgba(100, 240, 255, 0.9)');
  noseGlow.addColorStop(0.4, 'rgba(0, 200, 240, 0.4)');
  noseGlow.addColorStop(1,   'rgba(0, 150, 200, 0)');
  ctx.fillStyle = noseGlow;
  ctx.beginPath();
  ctx.arc(44, 0, 16, 0, Math.PI * 2);
  ctx.fill();

  // ── Hull rivets / detail ──
  ctx.fillStyle = 'rgba(0, 180, 200, 0.5)';
  [-20, 0, 18].forEach(rx => {
    ctx.beginPath();
    ctx.arc(rx, -10, 1.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(rx, 10, 1.5, 0, Math.PI * 2);
    ctx.fill();
  });

  // ── Bubble trail (emits from rear) ──
  // These are drawn as small translucent circles that rise
  drawBubbleTrail();

  ctx.restore();
}

// Small bubbles that drift up from behind the sub
const bubbles = Array.from({ length: 14 }, () => newBubble(true));

function newBubble(randomInit = false) {
  return {
    x:     -46 + (Math.random() - 0.5) * 8,
    y:     (Math.random() - 0.5) * 8,
    r:     0.8 + Math.random() * 2.2,
    vy:   -(0.4 + Math.random() * 0.6),
    vx:   -(0.3 + Math.random() * 0.5),
    life:  randomInit ? Math.random() : 0,
    maxLife: 0.6 + Math.random() * 0.8,
  };
}

function drawBubbleTrail() {
  bubbles.forEach(b => {
    b.life += 0.016;
    b.x    += b.vx;
    b.y    += b.vy;
    if (b.life >= b.maxLife) Object.assign(b, newBubble());

    const t = b.life / b.maxLife;
    ctx.globalAlpha = (1 - t) * 0.5;
    ctx.strokeStyle = 'rgba(120, 230, 255, 0.8)';
    ctx.lineWidth   = 0.8;
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
    ctx.stroke();
  });
  ctx.globalAlpha = 1;
}


// ─── 6. INPUT HANDLING ──────────────────────────────────────────────────────
// Simple key-state map. Holding a key is the primary control model.
const keys = { up:false, down:false, left:false, right:false, w:false, a:false, s:false, d:false, space:false };

window.addEventListener('keydown', e => {
  switch (e.code) {
    case 'ArrowUp':    keys.up    = true; break;
    case 'ArrowDown':  keys.down  = true; break;
    case 'ArrowLeft':  keys.left  = true; break;
    case 'ArrowRight': keys.right = true; break;
    case 'KeyW':       keys.w     = true; break;
    case 'KeyA':       keys.a     = true; break;
    case 'KeyS':       keys.s     = true; break;
    case 'KeyD':       keys.d     = true; break;
    case 'Space':      keys.space = true; e.preventDefault(); break;
  }
});

window.addEventListener('keyup', e => {
  switch (e.code) {
    case 'ArrowUp':    keys.up    = false; break;
    case 'ArrowDown':  keys.down  = false; break;
    case 'ArrowLeft':  keys.left  = false; break;
    case 'ArrowRight': keys.right = false; break;
    case 'KeyW':       keys.w     = false; break;
    case 'KeyA':       keys.a     = false; break;
    case 'KeyS':       keys.s     = false; break;
    case 'KeyD':       keys.d     = false; break;
    case 'Space':      keys.space = false; break;
  }
});


// ─── 7. DRAW HELPERS ────────────────────────────────────────────────────────

// The background is a vertical gradient from very deep navy to near-black.
// We also draw subtle horizontal "pressure layer" bands.
function drawBackground() {
  // Base ocean gradient
  const bg = ctx.createLinearGradient(0, 0, 0, LOGICAL_H);
  bg.addColorStop(0,    '#020d1a');
  bg.addColorStop(0.35, '#021428');
  bg.addColorStop(0.7,  '#010c1e');
  bg.addColorStop(1,    '#000810');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, LOGICAL_W, LOGICAL_H);

  // Subtle horizontal depth bands (thermoclines)
  for (let i = 0; i < 5; i++) {
    const bandY = (LOGICAL_H / 5) * i + ((state.tick * 0.12) % (LOGICAL_H / 5));
    const bandGrad = ctx.createLinearGradient(0, bandY, 0, bandY + 28);
    bandGrad.addColorStop(0,   'rgba(0, 80, 120, 0)');
    bandGrad.addColorStop(0.5, 'rgba(0, 80, 120, 0.04)');
    bandGrad.addColorStop(1,   'rgba(0, 80, 120, 0)');
    ctx.fillStyle = bandGrad;
    ctx.fillRect(0, bandY, LOGICAL_W, 28);
  }
}

// A gentle caustic-light shimmer on the surface (top ~80px)
function drawSurfaceCaustics() {
  const t = state.tick * 0.008;
  for (let i = 0; i < 8; i++) {
    const cx = ((i * 137 + t * 60) % LOGICAL_W);
    const cy = 20 + Math.sin(t + i) * 18;
    const r  = 30 + Math.sin(t * 1.3 + i * 0.8) * 15;
    const caustic = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
    caustic.addColorStop(0,   'rgba(0, 180, 220, 0.06)');
    caustic.addColorStop(1,   'rgba(0, 180, 220, 0)');
    ctx.fillStyle = caustic;
    ctx.beginPath();
    ctx.ellipse(cx, cy, r, r * 0.3, 0, 0, Math.PI * 2);
    ctx.fill();
  }
}

// Floor — drawn procedurally using the floor heightmap from the obstacle system
// (Falls back to flat band before obstacleSystem is initialised)
function drawFloor() {
  if (typeof obstacleSystem !== 'undefined') {
    obstacleSystem.drawFloor();
  } else {
    const floorY = LOGICAL_H - 55;
    const floorGrad = ctx.createLinearGradient(0, floorY, 0, LOGICAL_H);
    floorGrad.addColorStop(0, 'rgba(0, 20, 35, 0)');
    floorGrad.addColorStop(0.3, '#020e1c');
    floorGrad.addColorStop(1,   '#000508');
    ctx.fillStyle = floorGrad;
    ctx.fillRect(0, floorY, LOGICAL_W, LOGICAL_H - floorY);
  }
}

// Scan-line overlay — mimics a pressure-cracked viewport feel
function drawScanlines() {
  ctx.save();
  ctx.globalAlpha = 0.025;
  ctx.fillStyle = '#000';
  for (let y = 0; y < LOGICAL_H; y += 3) {
    ctx.fillRect(0, y, LOGICAL_W, 1);
  }
  ctx.restore();
}


// ─── 8. OBSTACLE SYSTEM ─────────────────────────────────────────────────────
//
// Rock fix rationale:
//   Old approach computed gap from ceilY=0 to floorY, but drew rocks with
//   relative polygon points that didn't match world-space Y positions.
//   New approach: rocks are drawn as filled paths FROM the screen edge
//   (top=0 for ceiling, floorY for floor), reaching a computed tip Y.
//   Gap is guaranteed by clamping tipY values so passage is always >= GAP_MIN.
//
//   makeRockPoints now uses smoothed mid-point displacement so the silhouette
//   looks like real rock, not a random comb.

// ── Seeded PRNG (Mulberry32) ──────────────────────────────────────────────
function mulberry32(seed) {
  return function() {
    seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}
const rng = mulberry32(0xDEADBEEF);

// ── Floor heightmap ───────────────────────────────────────────────────────
const FLOOR_SAMPLES = 420;
const floorHeights  = new Float32Array(FLOOR_SAMPLES);

(function generateFloor() {
  for (let i = 0; i < FLOOR_SAMPLES; i++) {
    const t = i / FLOOR_SAMPLES;
    const h =
      Math.sin(t * Math.PI * 6  + 0.3) * 22 +
      Math.sin(t * Math.PI * 13 + 1.1) * 12 +
      Math.sin(t * Math.PI * 28 + 2.4) * 6  +
      rng() * 8;
    floorHeights[i] = LOGICAL_H - 62 + h;
  }
})();

function getFloorY(worldX) {
  const t    = Math.max(0, (worldX / CFG.WORLD_LENGTH)) * (FLOOR_SAMPLES - 1);
  const i0   = Math.min(Math.floor(t), FLOOR_SAMPLES - 2);
  const i1   = i0 + 1;
  const frac = t - i0;
  return floorHeights[i0] * (1 - frac) + floorHeights[i1] * frac;
}

// ── Rock polygon helper ───────────────────────────────────────────────────
// Builds a smooth-ish jagged silhouette using midpoint displacement.
// anchor='ceiling': polygon goes from y=0 (top edge) down to tipY.
// anchor='floor':   polygon goes from y=floorY (floor edge) up to tipY.
// All coordinates are in SCREEN SPACE — no extra translation needed.
function makeRockPoly(cx, anchor, tipY, floorY, w, rand) {
  // Number of x-segments along the rock face
  const segs  = 5 + Math.floor(rand() * 3);   // 5–7 segments
  const half  = w / 2;
  const xs    = [];
  for (let i = 0; i <= segs; i++) xs.push(cx - half + (w / segs) * i);

  // Generate raw tip heights with midpoint displacement for smoother look
  // Start with straight line at tipY, then displace midpoints
  const ys = new Array(segs + 1).fill(tipY);

  // One pass of midpoint displacement
  function displace(l, r, depth) {
    if (r - l <= 1) return;
    const mid   = (l + r) >> 1;
    const range = (r - l) / segs;   // displacement scales with span
    if (anchor === 'ceiling') {
      // Ceiling rock tips point downward — displace toward floorY
      ys[mid] = (ys[l] + ys[r]) / 2 + (rand() - 0.3) * tipY * range * 0.5;
      ys[mid] = Math.min(ys[mid], tipY * 0.95);   // don't exceed tip
      ys[mid] = Math.max(ys[mid], 4);
    } else {
      // Floor rock tips point upward — displace toward 0
      ys[mid] = (ys[l] + ys[r]) / 2 + (rand() - 0.3) * (floorY - tipY) * range * 0.5;
      ys[mid] = Math.max(ys[mid], tipY * 1.02);
      ys[mid] = Math.min(ys[mid], floorY - 4);
    }
    displace(l, mid, depth + 1);
    displace(mid, r, depth + 1);
  }
  displace(0, segs, 0);

  // Build polygon: base edge → jagged face → close
  const pts = [];
  if (anchor === 'ceiling') {
    pts.push({ x: cx - half, y: 0 });             // top-left corner
    for (let i = 0; i <= segs; i++) pts.push({ x: xs[i], y: ys[i] }); // jagged bottom
    pts.push({ x: cx + half, y: 0 });             // top-right corner
  } else {
    pts.push({ x: cx - half, y: floorY });         // bottom-left corner
    for (let i = 0; i <= segs; i++) pts.push({ x: xs[i], y: ys[i] }); // jagged top
    pts.push({ x: cx + half, y: floorY });         // bottom-right corner
  }
  return pts;
}

// ── Obstacle generation ───────────────────────────────────────────────────
const obstacles = [];

(function generateObstacles() {

  // ── 1. Rock gate pairs ─────────────────────────────────────────────────
  // Each gate = one ceiling rock + one floor rock with a guaranteed gap.
  // Gap centre is biased toward screen middle (0.3–0.7 of usable height).
  for (let wx = 900; wx < CFG.WORLD_LENGTH - 500; wx += CFG.ROCK_SPACING + (rng() - 0.5) * 100) {

    const floorY  = getFloorY(wx);
    const usable  = floorY;                        // 0..floorY is navigable space
    const gapH    = CFG.ROCK_GAP_MIN + rng() * (CFG.ROCK_GAP_MAX - CFG.ROCK_GAP_MIN);

    // Gap centre: keep it away from extreme top/bottom so both rocks are visible
    const minCentre = gapH * 0.6 + 30;
    const maxCentre = usable - gapH * 0.6 - 30;
    if (maxCentre <= minCentre) continue;          // screen too narrow — skip
    const gapCentre = minCentre + rng() * (maxCentre - minCentre);

    const gapTop  = gapCentre - gapH / 2;         // Y where gap starts (top)
    const gapBot  = gapCentre + gapH / 2;         // Y where gap ends (bottom)

    const w = 44 + rng() * 28;                    // rock width 44–72px

    // Ceiling rock: hangs from y=0, tip reaches down to gapTop
    if (gapTop > 20) {
      const pts = makeRockPoly(0, 'ceiling', gapTop, floorY, w, rng);
      obstacles.push({
        type: 'rock', anchor: 'ceiling',
        worldX: wx, w, h: gapTop,
        bx: -w / 2, by: 0, bw: w, bh: gapTop,
        pts, shade: 0.4 + rng() * 0.6,
      });
    }

    // Floor rock: rises from floorY, tip reaches up to gapBot
    const floorRockH = floorY - gapBot;
    if (floorRockH > 16) {
      const pts = makeRockPoly(0, 'floor', gapBot, floorY, w, rng);
      obstacles.push({
        type: 'rock', anchor: 'floor',
        worldX: wx, w, h: floorRockH,
        bx: -w / 2, by: gapBot, bw: w, bh: floorRockH,
        pts, shade: 0.4 + rng() * 0.6,
      });
    }
  }

  // ── 2. Debris chunks ──────────────────────────────────────────────────
  for (let wx = 500; wx < CFG.WORLD_LENGTH - 200; wx += CFG.DEBRIS_SPACING + (rng() - 0.5) * 160) {
    const floorY = getFloorY(wx);
    const count  = 2 + Math.floor(rng() * 4);
    for (let c = 0; c < count; c++) {
      const dw = 14 + rng() * 28;
      const dh = 8  + rng() * 18;
      const dy = 80 + rng() * (floorY - 140);
      const dx = (rng() - 0.5) * 60;
      obstacles.push({
        type: 'debris', worldX: wx + dx,
        w: dw, h: dh,
        bx: -dw / 2, by: dy - dh / 2, bw: dw, bh: dh,
        y: dy, rotation: rng() * Math.PI,
        shade: rng(), variant: Math.floor(rng() * 3),
      });
    }
  }

  // ── 3. Coral clusters ────────────────────────────────────────────────
  for (let wx = 400; wx < CFG.WORLD_LENGTH - 300; wx += CFG.CORAL_SPACING + (rng() - 0.5) * 180) {
    const floorY = getFloorY(wx);
    const count  = 3 + Math.floor(rng() * 5);
    for (let c = 0; c < count; c++) {
      const cx = (rng() - 0.5) * 80;
      const ch = 18 + rng() * 36;
      const cw = 5  + rng() * 8;
      obstacles.push({
        type: 'coral', worldX: wx + cx, baseY: floorY,
        h: ch, w: cw,
        bx: -cw, by: floorY - ch, bw: cw * 2, bh: ch,
        hue: rng() > 0.5 ? 160 : 280,
        shade: 0.6 + rng() * 0.4,
        sway: (rng() - 0.5) * 0.04,
        swayPhase: rng() * Math.PI * 2,
      });
    }
  }

})();

// ── Obstacle draw & collision ──────────────────────────────────────────────

const obstacleSystem = {

  drawFloor() {
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(0, LOGICAL_H);
    for (let sx = 0; sx <= LOGICAL_W; sx += 4) {
      ctx.lineTo(sx, getFloorY(state.worldX + sx));
    }
    ctx.lineTo(LOGICAL_W, LOGICAL_H);
    ctx.closePath();
    const grad = ctx.createLinearGradient(0, LOGICAL_H - 80, 0, LOGICAL_H);
    grad.addColorStop(0,   '#011520');
    grad.addColorStop(0.4, '#010c18');
    grad.addColorStop(1,   '#000508');
    ctx.fillStyle = grad;
    ctx.fill();
    // Glowing edge
    ctx.strokeStyle = 'rgba(0, 100, 140, 0.35)';
    ctx.lineWidth   = 1.5;
    ctx.beginPath();
    for (let sx = 0; sx <= LOGICAL_W; sx += 4) {
      const fy = getFloorY(state.worldX + sx);
      sx === 0 ? ctx.moveTo(sx, fy) : ctx.lineTo(sx, fy);
    }
    ctx.stroke();
    ctx.restore();
  },

  draw() {
    const margin = 140;
    for (const ob of obstacles) {
      const sx = ob.worldX - state.worldX;
      if (sx < -margin || sx > LOGICAL_W + margin) continue;
      ctx.save();
      ctx.translate(sx, 0);
      if      (ob.type === 'rock')   this.drawRock(ob);
      else if (ob.type === 'debris') this.drawDebris(ob);
      else if (ob.type === 'coral')  this.drawCoral(ob);
      if (CFG.DEBUG) {
        ctx.strokeStyle = 'rgba(255,0,0,0.75)';
        ctx.lineWidth   = 1;
        ctx.strokeRect(ob.bx, ob.by, ob.bw, ob.bh);
      }
      ctx.restore();
    }
  },

  drawRock(ob) {
    const pts = ob.pts;
    if (!pts || pts.length < 3) return;
    const s = ob.shade;

    // Rock body — filled polygon (pts are already in screen-space Y)
    ctx.beginPath();
    ctx.moveTo(pts[0].x, pts[0].y);
    for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
    ctx.closePath();

    // Gradient: darker toward screen edge, lighter at the exposed tip
    const tipY   = ob.anchor === 'ceiling' ? ob.h : ob.by;
    const edgeY  = ob.anchor === 'ceiling' ? 0 : ob.by + ob.h;
    const grad   = ctx.createLinearGradient(0, edgeY, 0, tipY);
    grad.addColorStop(0,    `rgba(2, 8, 14, 1)`);
    grad.addColorStop(0.55, `rgba(${6+s*16}, ${16+s*14}, ${22+s*18}, 1)`);
    grad.addColorStop(1,    `rgba(${12+s*22}, ${28+s*18}, ${36+s*22}, 1)`);
    ctx.fillStyle = grad;
    ctx.fill();

    // Silhouette edge glow
    ctx.strokeStyle = `rgba(0, ${70+s*80}, ${90+s*80}, 0.45)`;
    ctx.lineWidth   = 1.4;
    ctx.stroke();

    // Algae/moss tint along the jagged face
    ctx.strokeStyle = `rgba(0, 160, 100, 0.12)`;
    ctx.lineWidth   = 2.5;
    ctx.beginPath();
    // Only stroke the jagged silhouette edge, not the base
    const start = 1;
    const end   = pts.length - 2;
    ctx.moveTo(pts[start].x, pts[start].y);
    for (let i = start + 1; i <= end; i++) ctx.lineTo(pts[i].x, pts[i].y);
    ctx.stroke();
  },

  drawDebris(ob) {
    ctx.save();
    ctx.translate(0, ob.y);
    ctx.rotate(ob.rotation);
    const hw = ob.w / 2, hh = ob.h / 2;
    const s  = ob.shade;

    if (ob.variant === 0) {
      const g = ctx.createLinearGradient(-hw, -hh, -hw, hh);
      g.addColorStop(0,   `rgba(${20+s*15},${40+s*20},${50+s*25},0.9)`);
      g.addColorStop(0.5, `rgba(${30+s*20},${55+s*25},${65+s*30},0.9)`);
      g.addColorStop(1,   `rgba(${10+s*10},${25+s*12},${32+s*15},0.9)`);
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.roundRect(-hw,-hh,ob.w,ob.h,2); ctx.fill();
      ctx.strokeStyle = `rgba(0,${100+s*80},${120+s*80},0.3)`;
      ctx.lineWidth = 0.8; ctx.stroke();
      ctx.fillStyle = `rgba(0,${60+s*60},${80+s*60},0.5)`;
      ctx.beginPath(); ctx.ellipse(-hw,0,3,hh,0,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse( hw,0,3,hh,0,0,Math.PI*2); ctx.fill();
    } else if (ob.variant === 1) {
      ctx.fillStyle = `rgba(${10+s*12},${28+s*14},${36+s*18},0.88)`;
      ctx.fillRect(-hw,-hh,ob.w,ob.h);
      ctx.strokeStyle = `rgba(0,${80+s*70},${100+s*70},0.35)`;
      ctx.lineWidth = 0.8; ctx.strokeRect(-hw,-hh,ob.w,ob.h);
      ctx.fillStyle = `rgba(0,${90+s*60},${110+s*60},0.4)`;
      [[-hw+4,-hh+4],[hw-4,-hh+4],[-hw+4,hh-4],[hw-4,hh-4]].forEach(([rx,ry])=>{
        ctx.beginPath(); ctx.arc(rx,ry,1.5,0,Math.PI*2); ctx.fill();
      });
    } else {
      const rg = ctx.createRadialGradient(-hw*.3,-hh*.3,0,0,0,hw);
      rg.addColorStop(0,   `rgba(${20+s*20},${55+s*25},${70+s*30},0.9)`);
      rg.addColorStop(0.7, `rgba(${8+s*10},${25+s*12},${35+s*15},0.9)`);
      rg.addColorStop(1,   `rgba(2,8,14,0.9)`);
      ctx.fillStyle = rg;
      ctx.beginPath(); ctx.ellipse(0,0,hw,hh,0,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle = `rgba(0,${80+s*60},${100+s*60},0.35)`;
      ctx.lineWidth = 0.8; ctx.stroke();
    }
    ctx.restore();
  },

  drawCoral(ob) {
    const sway = Math.sin(state.tick * ob.sway * 2 + ob.swayPhase) * 6;
    ctx.save();
    ctx.translate(0, ob.baseY);
    const branches = 3 + Math.floor(ob.w / 4);
    for (let b = 0; b < branches; b++) {
      const bx  = (b / (branches - 1) - 0.5) * ob.w * 1.8;
      const bh  = ob.h * (0.5 + (b % 2 === 0 ? 0.5 : 0.3));
      const tipX = bx + sway * (bh / ob.h);
      ctx.beginPath();
      ctx.moveTo(bx, 0);
      ctx.quadraticCurveTo(bx + sway * 0.5, -bh * 0.5, tipX, -bh);
      ctx.strokeStyle = `hsla(${ob.hue},70%,${35+ob.shade*25}%,0.75)`;
      ctx.lineWidth   = 1.5 + (branches - b) * 0.3;
      ctx.lineCap     = 'round';
      ctx.stroke();
      ctx.beginPath(); ctx.arc(tipX, -bh, 2.5, 0, Math.PI*2);
      ctx.fillStyle = `hsla(${ob.hue},90%,65%,0.5)`;
      ctx.fill();
    }
    ctx.restore();
  },

  checkCollisions() {
    const p   = state.player;
    const phw = 26;
    const phh = 8;
    let hit   = false;

    // Floor
    const floorY = getFloorY(state.worldX + p.x);
    if (p.y + phh > floorY) { p.y = floorY - phh; p.vy = 0; hit = true; }
    // Ceiling
    if (p.y - phh < 8)      { p.y = 8 + phh;      p.vy = 0; hit = true; }

    // Obstacles AABB
    for (const ob of obstacles) {
      const sx = ob.worldX - state.worldX;
      if (sx < -160 || sx > LOGICAL_W + 160) continue;
      const left   = sx + ob.bx,  right  = sx + ob.bx + ob.bw;
      const top    = ob.by,       bottom = ob.by + ob.bh;
      const pl = p.x - phw, pr = p.x + phw;
      const pt = p.y - phh, pb = p.y + phh;
      if (pr > left && pl < right && pb > top && pt < bottom) {
        hit = true;
        const oL = pr-left, oR = right-pl, oT = pb-top, oB = bottom-pt;
        const mn = Math.min(oL,oR,oT,oB);
        if      (mn===oL){ p.x -= oL*0.5; p.vx*=-0.3; }
        else if (mn===oR){ p.x += oR*0.5; p.vx*=-0.3; }
        else if (mn===oT){ p.y -= oT*0.5; p.vy*=-0.3; }
        else             { p.y += oB*0.5; p.vy*=-0.3; }
      }
    }

    state.colliding = hit;
    return hit;
  },
};


// ─── 9. CREATURE SYSTEM ─────────────────────────────────────────────────────
// Two creature types, each with distinct behaviour:
//
//  ANGLERFISH  — lurks near the floor, patrols a fixed horizontal range.
//                Has a bioluminescent lure on a stalk above its head.
//                Slow, but its hitbox is wide. Facing direction follows motion.
//
//  JELLYFISH   — drifts vertically in a sine wave while scrolling with the world.
//                Passive but fills narrow passages. Glows with a pulsing halo.
//
// Both creatures use circle-based collision (radius stored on object).
// They are generated at world-init time (same seeded RNG pass).

const creatures = [];

(function generateCreatures() {
  for (let wx = 1200; wx < CFG.WORLD_LENGTH - 600; wx += CFG.CREATURE_SPACING + (rng() - 0.5) * 300) {
    const kind = rng() > 0.45 ? 'jellyfish' : 'anglerfish';

    if (kind === 'anglerfish') {
      const floorY = getFloorY(wx);
      creatures.push({
        kind,
        worldX:    wx,
        baseY:     floorY - 28,       // hovers just above floor
        y:         floorY - 28,
        patrolAmp: 60 + rng() * 80,   // how far it roams horizontally (world-space)
        patrolSpeed: 0.004 + rng() * 0.006,
        patrolPhase: rng() * Math.PI * 2,
        facing:    1,                  // 1=right, -1=left
        lurePhase: rng() * Math.PI * 2,
        r:         22,                 // collision radius
        shade:     rng(),
      });
    } else {
      // Jellyfish — mid-water, vertical sinusoidal drift
      const floorY  = getFloorY(wx);
      const centreY = 80 + rng() * (floorY - 200);
      creatures.push({
        kind,
        worldX:    wx,
        baseY:     centreY,
        y:         centreY,
        driftAmp:  25 + rng() * 40,
        driftSpeed: 0.012 + rng() * 0.014,
        driftPhase: rng() * Math.PI * 2,
        pulsePhase: rng() * Math.PI * 2,
        r:         18,
        hue:       140 + rng() * 100, // teal to blue-purple
        tentacleCount: 5 + Math.floor(rng() * 4),
        shade:     rng(),
      });
    }
  }
})();

const creatureSystem = {

  update() {
    for (const c of creatures) {
      if (c.kind === 'anglerfish') {
        // Patrol: oscillate world-X position around spawn worldX
        const prevWorldX = c.worldX;
        c.worldX = c.worldX + Math.sin(state.tick * c.patrolSpeed + c.patrolPhase) * 0.6;
        // Derive facing from direction of travel
        const dx = c.worldX - prevWorldX;
        if (Math.abs(dx) > 0.01) c.facing = dx > 0 ? 1 : -1;
        // Subtle vertical bob
        c.y = c.baseY + Math.sin(state.tick * 0.018 + c.patrolPhase) * 5;
      } else {
        // Jellyfish: pure vertical sine
        c.y = c.baseY + Math.sin(state.tick * c.driftSpeed + c.driftPhase) * c.driftAmp;
      }
    }
  },

  draw() {
    const margin = 160;
    for (const c of creatures) {
      const sx = c.worldX - state.worldX;
      if (sx < -margin || sx > LOGICAL_W + margin) continue;
      ctx.save();
      ctx.translate(sx, c.y);
      if (c.kind === 'anglerfish') this.drawAnglerfish(c);
      else                          this.drawJellyfish(c);
      if (CFG.DEBUG) {
        ctx.strokeStyle = 'rgba(255,200,0,0.8)';
        ctx.lineWidth   = 1;
        ctx.beginPath(); ctx.arc(0, 0, c.r, 0, Math.PI*2); ctx.stroke();
      }
      ctx.restore();
    }
  },

  drawAnglerfish(c) {
    const f = c.facing;  // 1 or -1
    ctx.save();
    ctx.scale(f, 1);     // flip horizontally based on direction

    // ── Lure stalk + light ──
    const lurePulse = 0.7 + 0.3 * Math.sin(state.tick * 0.06 + c.lurePhase);
    ctx.save();
    ctx.strokeStyle = 'rgba(0, 200, 120, 0.5)';
    ctx.lineWidth   = 1.2;
    ctx.beginPath();
    ctx.moveTo(4, -14);
    ctx.bezierCurveTo(10, -28, 18, -36, 14, -44);
    ctx.stroke();
    // Lure bulb glow
    ctx.save();
    ctx.globalAlpha = lurePulse;
    const lureGrad = ctx.createRadialGradient(14, -44, 0, 14, -44, 10);
    lureGrad.addColorStop(0,   'rgba(80, 255, 160, 1)');
    lureGrad.addColorStop(0.4, 'rgba(0, 200, 100, 0.5)');
    lureGrad.addColorStop(1,   'rgba(0, 180, 80, 0)');
    ctx.fillStyle = lureGrad;
    ctx.beginPath(); ctx.arc(14, -44, 10, 0, Math.PI*2); ctx.fill();
    ctx.restore();
    ctx.restore();

    // ── Body ──
    const s = c.shade;
    const bodyGrad = ctx.createRadialGradient(-2, -2, 2, 0, 0, 22);
    bodyGrad.addColorStop(0,   `rgba(${18+s*20},${30+s*18},${22+s*15},1)`);
    bodyGrad.addColorStop(0.6, `rgba(${8+s*12}, ${16+s*10},${12+s*8}, 1)`);
    bodyGrad.addColorStop(1,   `rgba(2, 6, 4, 1)`);
    ctx.fillStyle = bodyGrad;
    ctx.beginPath();
    ctx.ellipse(0, 0, 22, 14, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.strokeStyle = `rgba(0,${60+s*80},${40+s*60},0.4)`;
    ctx.lineWidth = 1; ctx.stroke();

    // ── Huge jaw ──
    ctx.fillStyle = `rgba(${4+s*12},${10+s*8},${8+s*6},1)`;
    ctx.beginPath();
    ctx.moveTo(-8, 6);
    ctx.lineTo(24, 10);
    ctx.lineTo(20, 18);
    ctx.lineTo(-10, 14);
    ctx.closePath(); ctx.fill();
    // Teeth
    ctx.fillStyle = 'rgba(200, 220, 210, 0.6)';
    for (let t = 0; t < 5; t++) {
      const tx = -2 + t * 5;
      ctx.beginPath();
      ctx.moveTo(tx, 9); ctx.lineTo(tx+2, 15); ctx.lineTo(tx+4, 9);
      ctx.closePath(); ctx.fill();
    }

    // ── Eye ──
    ctx.fillStyle = `rgba(255, 200, 80, 0.9)`;
    ctx.beginPath(); ctx.arc(12, -5, 4.5, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = 'rgba(0,0,0,0.85)';
    ctx.beginPath(); ctx.arc(13, -5, 2.5, 0, Math.PI*2); ctx.fill();
    // Eye gleam
    ctx.fillStyle = 'rgba(255,255,255,0.8)';
    ctx.beginPath(); ctx.arc(14, -6, 1, 0, Math.PI*2); ctx.fill();

    // ── Fins ──
    ctx.fillStyle = `rgba(${8+s*14},${20+s*12},${14+s*10},0.7)`;
    ctx.beginPath();
    ctx.moveTo(-10, -4); ctx.lineTo(-22, -14); ctx.lineTo(-16, 2);
    ctx.closePath(); ctx.fill();
    ctx.beginPath();
    ctx.moveTo(4, 10); ctx.lineTo(-2, 22); ctx.lineTo(14, 14);
    ctx.closePath(); ctx.fill();

    ctx.restore();
  },

  drawJellyfish(c) {
    const pulse = 0.6 + 0.4 * Math.sin(state.tick * 0.05 + c.pulsePhase);
    const hr    = 16 * (0.85 + 0.15 * pulse);  // horizontal radius pulses
    const vr    = 12 * (1.1  - 0.1  * pulse);  // vertical radius counter-pulses
    const hue   = c.hue;
    const s     = c.shade;

    // ── Outer halo glow ──
    ctx.save();
    ctx.globalAlpha = 0.18 * pulse;
    const halo = ctx.createRadialGradient(0, 0, hr * 0.5, 0, 0, hr * 2.2);
    halo.addColorStop(0,  `hsla(${hue},80%,65%,1)`);
    halo.addColorStop(1,  `hsla(${hue},80%,65%,0)`);
    ctx.fillStyle = halo;
    ctx.beginPath(); ctx.ellipse(0, 0, hr*2.2, vr*2.2, 0, 0, Math.PI*2); ctx.fill();
    ctx.restore();

    // ── Bell (dome) ──
    const bellGrad = ctx.createRadialGradient(-hr*0.3, -vr*0.5, 1, 0, 0, hr);
    bellGrad.addColorStop(0,   `hsla(${hue},70%,${45+s*20}%,0.85)`);
    bellGrad.addColorStop(0.6, `hsla(${hue},60%,${25+s*15}%,0.75)`);
    bellGrad.addColorStop(1,   `hsla(${hue},50%,10%,0.6)`);
    ctx.fillStyle = bellGrad;
    // Draw dome: full ellipse top half + closed at rim
    ctx.beginPath();
    ctx.ellipse(0, 0, hr, vr, 0, Math.PI, 0);  // top half arc
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle = `hsla(${hue},70%,70%,0.4)`;
    ctx.lineWidth = 0.8; ctx.stroke();

    // ── Inner pattern (circular rings inside bell) ──
    ctx.save();
    ctx.globalAlpha = 0.3;
    ctx.strokeStyle = `hsla(${hue},80%,75%,1)`;
    ctx.lineWidth = 0.6;
    for (let ring = 1; ring <= 2; ring++) {
      ctx.beginPath();
      ctx.ellipse(0, 0, hr * ring/3, vr * ring/3, 0, Math.PI, 0);
      ctx.stroke();
    }
    ctx.restore();

    // ── Tentacles ──
    for (let t = 0; t < c.tentacleCount; t++) {
      const tx = -hr * 0.8 + (hr * 1.6 / (c.tentacleCount - 1)) * t;
      const waveOffset = state.tick * 0.025 + t * 0.8 + c.driftPhase;
      const sway = Math.sin(waveOffset) * 8;
      const len  = 20 + Math.sin(waveOffset * 1.3) * 6;

      ctx.beginPath();
      ctx.moveTo(tx, 0);
      ctx.quadraticCurveTo(tx + sway * 0.5, len * 0.5, tx + sway, len);
      ctx.strokeStyle = `hsla(${hue},60%,55%,${0.3 + 0.2 * pulse})`;
      ctx.lineWidth   = 1.2;
      ctx.lineCap     = 'round';
      ctx.stroke();
    }
  },

  checkCollisions() {
    const p   = state.player;
    const pr  = 14;  // player collision radius (smaller than hitbox — very forgiving)
    for (const c of creatures) {
      const sx = c.worldX - state.worldX;
      const dx = p.x - sx;
      const dy = p.y - c.y;
      const dist = Math.hypot(dx, dy);
      if (dist < pr + c.r) {
        // Kill velocity and flag collision
        p.vx *= -0.4; p.vy *= -0.4;
        state.colliding = true;
        return true;
      }
    }
    return false;
  },
};





function update() {
  if (!state.running) return;

  state.tick++;

  // Scroll the world
  state.worldX += CFG.SCROLL_SPEED;

  // Update sub-systems
  updateParticles();
  updatePlayer();
  creatureSystem.update();

  // Collision detection (after player position is updated)
  obstacleSystem.checkCollisions();
  creatureSystem.checkCollisions();

  // Update HUD elements
  updateHUD();
}


// ─── HUD UPDATES ────────────────────────────────────────────────────────────
const oxyFill  = document.getElementById('oxy-bar-fill');
const depthVal = document.getElementById('depth-value');

function updateHUD() {
  // Oxygen bar width
  const pct = (state.oxygen / CFG.OXY_MAX) * 100;
  oxyFill.style.width = pct + '%';

  // Colour shifts to red when critical (≤ 25%)
  if (pct <= 25) {
    oxyFill.style.background = `linear-gradient(90deg, #c0392b, #e74c3c)`;
    oxyFill.style.boxShadow  = '0 0 10px rgba(220,50,50,0.7)';
  } else if (pct <= 50) {
    oxyFill.style.background = `linear-gradient(90deg, #e67e22, #f39c12)`;
    oxyFill.style.boxShadow  = '0 0 8px rgba(230,120,30,0.6)';
  } else {
    oxyFill.style.background = `linear-gradient(90deg, #00c8a0, #00ecd4)`;
    oxyFill.style.boxShadow  = '0 0 8px rgba(0,230,200,0.6)';
  }

  // Depth — derived from vertical position + world progress
  // Surface = 0m, bottom = ~2400m (arbitrary cinematic scale)
  const depthM = Math.round(
    (state.player.y / LOGICAL_H) * 800 +
    (state.worldX / CFG.WORLD_LENGTH) * 1600
  );
  depthVal.textContent = depthM + 'm';
}


// ─── 10. RENDER LOGIC ────────────────────────────────────────────────────────
function render() {
  // Clear
  ctx.clearRect(0, 0, LOGICAL_W, LOGICAL_H);

  // Layer order (back → front):
  drawBackground();
  drawSurfaceCaustics();
  drawParticles();

  // Obstacles sit behind the player but above background
  obstacleSystem.draw();   // draws rocks, debris, coral
  drawFloor();             // procedural floor (drawn on top to cover rock bases)

  // Creatures render above floor but below player
  creatureSystem.draw();

  // Player — position includes idle bob
  const p = state.player;
  drawSubmarine(p.x, p.y + p.bobOffset);

  // World progress indicator (thin bar at very bottom)
  drawProgressBar();

  // UI overlay effects
  drawScanlines();
}

// Thin progress bar showing how far through the level the player is
function drawProgressBar() {
  const progress = Math.min(state.worldX / CFG.WORLD_LENGTH, 1);
  const barH = 2;
  const barY = LOGICAL_H - barH;

  // Track
  ctx.fillStyle = 'rgba(0, 40, 60, 0.6)';
  ctx.fillRect(0, barY, LOGICAL_W, barH);

  // Fill
  ctx.fillStyle = 'rgba(0, 180, 200, 0.5)';
  ctx.fillRect(0, barY, LOGICAL_W * progress, barH);

  // Beacon marker at the end
  ctx.fillStyle = 'rgba(255, 180, 60, 0.7)';
  ctx.fillRect(LOGICAL_W - 3, barY - 1, 3, barH + 2);
}


// ─── 11. GAME LOOP ───────────────────────────────────────────────────────────
function gameLoop() {
  update();
  render();
  requestAnimationFrame(gameLoop);
}

// Kick it off
requestAnimationFrame(gameLoop);
</script>
